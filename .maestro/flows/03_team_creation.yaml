appId: com.gullycricket.scorer
name: "Team — Create Team A and Team B with Admin PIN"
tags:
  - team
  - smoke

# Covers:
#   - Navigate to Teams tab → Create Team
#   - Fill name, short name
#   - Enable and set Admin PIN
#   - Confirm creation → lands on team detail screen
#   - Repeat for Team B (no PIN)
# Precondition: user is logged in as team_admin (pro plan or higher)
# Idempotent: skips creation if the team already exists from a previous run

---
- launchApp:
    clearState: false

- runFlow:
    file: "utils/ensure_logged_in.yaml"

# ═══════════════════════════════════════════════════════
# Create TEAM A — Challengers XI (with Admin PIN)
# ═══════════════════════════════════════════════════════

- tapOn:
    id: "tab-teams"
- assertVisible:
    id: "teams-screen"

# Only create if it doesn't already exist from a previous run
- runFlow:
    when:
      notVisible: "Challengers XI"
    commands:
      - tapOn:
          id: "teams-create-team-btn"
      - assertVisible:
          id: "team-create-screen"

      - tapOn:
          id: "team-create-name-input"
      - eraseText: 50
      - inputText: "Challengers XI"

      - tapOn:
          id: "team-create-short-name-input"
      - eraseText: 50
      - inputText: "CHAL"

      - tapOn:
          id: "team-create-pin-toggle"
      - assertVisible:
          id: "team-create-pin-input"

      - tapOn:
          id: "team-create-pin-input"
      - inputText: "9999"

      - tapOn:
          id: "team-create-confirm-pin-input"
      - inputText: "9999"

      - assertNotVisible: "PINs do not match"

      - tapOn:
          id: "team-create-btn"
      - extendedWaitUntil:
          visible:
            id: "team-detail-screen"
          timeout: 5000
      - assertVisible: "Challengers XI"

# ═══════════════════════════════════════════════════════
# Create TEAM B — Warriors CC (no PIN)
# ═══════════════════════════════════════════════════════

- tapOn:
    id: "tab-teams"

- runFlow:
    when:
      notVisible: "Warriors CC"
    commands:
      - tapOn:
          id: "teams-create-team-btn"

      - tapOn:
          id: "team-create-name-input"
      - eraseText: 50
      - inputText: "Warriors CC"

      - tapOn:
          id: "team-create-short-name-input"
      - eraseText: 50
      - inputText: "WARR"

      - assertNotVisible:
          id: "team-create-pin-input"

      - tapOn:
          id: "team-create-btn"
      - extendedWaitUntil:
          visible:
            id: "team-detail-screen"
          timeout: 5000
      - assertVisible: "Warriors CC"

# ═══════════════════════════════════════════════════════
# Negative: duplicate name is rejected
# ═══════════════════════════════════════════════════════

- tapOn:
    id: "tab-teams"
- tapOn:
    id: "teams-create-team-btn"

- tapOn:
    id: "team-create-name-input"
- inputText: "Challengers XI"

- tapOn:
    id: "team-create-short-name-input"
- inputText: "CHAL"

- tapOn:
    id: "team-create-btn"
- waitForAnimationToEnd

- assertVisible: "A team with this name already exists"
- tapOn:
    id: "team-create-cancel-btn"
