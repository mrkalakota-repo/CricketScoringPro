<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Teal background circle -->
  <circle cx="512" cy="512" r="512" fill="#00695C"/>

  <!-- ── Cricket Stumps (behind bat) ── -->
  <!-- Stump shadows -->
  <rect x="451" y="670" width="14" height="200" rx="5" fill="rgba(0,0,0,0.18)"/>
  <rect x="505" y="670" width="14" height="200" rx="5" fill="rgba(0,0,0,0.18)"/>
  <rect x="559" y="670" width="14" height="200" rx="5" fill="rgba(0,0,0,0.18)"/>
  <!-- Stumps -->
  <rect x="448" y="665" width="14" height="198" rx="5" fill="#E8D8A0"/>
  <rect x="502" y="665" width="14" height="198" rx="5" fill="#E8D8A0"/>
  <rect x="556" y="665" width="14" height="198" rx="5" fill="#E8D8A0"/>
  <!-- Stump grain lines -->
  <line x1="455" y1="680" x2="455" y2="855" stroke="#D4C070" stroke-width="2" opacity="0.6"/>
  <line x1="509" y1="680" x2="509" y2="855" stroke="#D4C070" stroke-width="2" opacity="0.6"/>
  <line x1="563" y1="680" x2="563" y2="855" stroke="#D4C070" stroke-width="2" opacity="0.6"/>
  <!-- Bail 1 (off to middle) -->
  <rect x="448" y="656" width="68" height="16" rx="6" fill="#C8B060"/>
  <!-- Bail 2 (middle to leg) -->
  <rect x="502" y="656" width="68" height="16" rx="6" fill="#C8B060"/>
  <!-- Stump tops highlight -->
  <rect x="448" y="656" width="14" height="8" rx="4" fill="#F0E0B0"/>
  <rect x="502" y="656" width="14" height="8" rx="4" fill="#F0E0B0"/>
  <rect x="556" y="656" width="14" height="8" rx="4" fill="#F0E0B0"/>

  <!-- ── Cricket Bat ── -->
  <!-- Handle grip (dark brown) -->
  <rect x="468" y="148" width="56" height="168" rx="18" fill="#5D4037"/>
  <!-- Grip wrapping lines -->
  <rect x="468" y="160" width="56" height="10" rx="5" fill="#3E2723" opacity="0.55"/>
  <rect x="468" y="182" width="56" height="10" rx="5" fill="#3E2723" opacity="0.55"/>
  <rect x="468" y="204" width="56" height="10" rx="5" fill="#3E2723" opacity="0.55"/>
  <rect x="468" y="226" width="56" height="10" rx="5" fill="#3E2723" opacity="0.55"/>
  <rect x="468" y="248" width="56" height="10" rx="5" fill="#3E2723" opacity="0.55"/>
  <!-- Splice / shoulder -->
  <path d="M 468 308 L 440 328 L 440 680 Q 440 720 480 730 L 512 734 L 544 730 Q 584 720 584 680 L 584 328 L 556 308 Z" fill="#F5F0DC"/>
  <!-- Splice join -->
  <rect x="440" y="308" width="144" height="20" rx="6" fill="#E8E0C4"/>
  <!-- Bat grain lines -->
  <line x1="470" y1="340" x2="470" y2="700" stroke="#D9D0B0" stroke-width="3" opacity="0.6"/>
  <line x1="490" y1="330" x2="490" y2="712" stroke="#D9D0B0" stroke-width="3" opacity="0.6"/>
  <line x1="512" y1="328" x2="512" y2="714" stroke="#D9D0B0" stroke-width="3" opacity="0.6"/>
  <line x1="534" y1="330" x2="534" y2="712" stroke="#D9D0B0" stroke-width="3" opacity="0.6"/>
  <line x1="554" y1="340" x2="554" y2="700" stroke="#D9D0B0" stroke-width="3" opacity="0.6"/>
  <!-- Bat toe (rounded bottom) -->
  <ellipse cx="512" cy="718" rx="72" ry="20" fill="#EAE0C2"/>
  <!-- Bat edge highlight -->
  <rect x="440" y="328" width="12" height="352" rx="6" fill="rgba(255,255,255,0.18)"/>

  <!-- ── Cricket Ball ── floating top-right of bat ── -->
  <circle cx="660" cy="310" r="118" fill="#C62828"/>
  <!-- Ball highlight (leather sheen) -->
  <ellipse cx="630" cy="272" rx="38" ry="24" fill="rgba(255,255,255,0.18)" transform="rotate(-25,630,272)"/>
  <!-- Ball seam – horizontal band -->
  <path d="M 547 310 Q 590 254 660 254 Q 730 254 773 310 Q 730 366 660 366 Q 590 366 547 310 Z"
        fill="none" stroke="rgba(255,255,255,0.90)" stroke-width="5"/>
  <!-- Seam stitches top arc -->
  <line x1="568" y1="280" x2="578" y2="292" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="594" y1="262" x2="602" y2="274" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="622" y1="255" x2="628" y2="268" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="650" y1="253" x2="654" y2="266" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="678" y1="256" x2="680" y2="269" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="704" y1="265" x2="703" y2="278" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="727" y1="280" x2="723" y2="292" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Seam stitches bottom arc -->
  <line x1="568" y1="340" x2="578" y2="328" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="594" y1="358" x2="602" y2="346" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="622" y1="365" x2="628" y2="352" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="650" y1="367" x2="654" y2="354" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="678" y1="364" x2="680" y2="351" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="704" y1="355" x2="703" y2="342" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="727" y1="340" x2="723" y2="328" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
</svg>
