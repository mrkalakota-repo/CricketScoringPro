version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node --version
        - npm ci --legacy-peer-deps
    build:
      commands:
        - echo "EXPO_PUBLIC vars available:" && printenv | grep EXPO_PUBLIC | sed 's/=.*/=***/' || echo "(none found)"
        - npx expo export --platform web
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
